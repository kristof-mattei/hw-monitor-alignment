# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  # each new commit to a PR runs this workflow
  # so we need to avoid a long running older one from overwriting the "pr-<number>-latest"
  group: "${{ github.workflow }} @ ${{ github.ref_name }}"
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-build:
    name: Build Rust code
    if: ${{ !startsWith(github.head_ref, 'release/') }}
    uses: ./.github/workflows/rust.yml
    secrets: inherit
    permissions:
      checks: write
      contents: read
      id-token: write
      pull-requests: write

  changes:
    name: Detect changes
    runs-on: ubuntu-slim
    if: ${{ !startsWith(github.head_ref, 'release/') }}
    permissions:
      contents: read
      pull-requests: read
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - &checkout
        name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          show-progress: false

      - name: Check if we actually made changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: .github/file-filters.yml

  calculate-version:
    name: Calculate version
    runs-on: ubuntu-slim
    permissions:
      contents: read
    needs:
      - changes
    outputs:
      version: ${{ steps.version.outputs.version }}
    if: |
      github.event_name == 'pull_request' &&
      (
        fromJSON(needs.changes.outputs.docker) == true ||
        fromJSON(needs.changes.outputs.rust) == true
      )
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          show-progress: false
          fetch-depth: 0

      - name: Install git-cliff to generate changelog & next version number
        uses: taiki-e/install-action@56545b37b57562edd73171cb6c62cc509db4c34e # v2.81.7
        with:
          tool: git-cliff

      - name: Calculate next version
        shell: bash
        id: version
        run: |
          latest_tag=$(git describe --tags --abbrev=0 || true)
          bumped=$(git-cliff --bumped-version --unreleased --github-token ${{ secrets.GITHUB_TOKEN }})

          # If git-cliff didn't bump (e.g. chore/ci only commits), force a patch increment
          # so we never tag a Docker image with the same version as the last release.
          if [ "${bumped}" = "${latest_tag}" ]; then
            bumped=$(git-cliff --bumped-version --bump patch --unreleased --github-token ${{ secrets.GITHUB_TOKEN }})
            echo "Force bumping to ${bumped}"
          fi

          # remove v
          version="${bumped//v/}"

          # store
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

  all-done:
    name: All done
    # this is the job that should be marked as required on GitHub. It's the only one that'll reliably trigger
    # when any upstream fails: success
    # when all upstream skips: pass
    # when all upstream success: success
    # combination of upstream skip and success: success
    runs-on: ubuntu-slim
    needs:
      - changes
      - calculate-version
      - rust-build
    if: |
      !cancelled()
    steps:
      - name: Fail!
        shell: bash
        if: |
          contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'cancelled')
        run: |
          echo "One / more upstream failed or was cancelled. Failing job..."

          exit 1

      - name: Success!
        shell: bash
        run: |
          echo "Great success!"
