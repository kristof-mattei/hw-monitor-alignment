# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build Rust

on:
  workflow_call:

permissions:
  contents: read

env:
  CARGO_FEATURES: --all-features
  CARGO_TERM_COLOR: always
  RUSTFLAGS: --deny=warnings

jobs:
  warm-up-cache:
    name: Warm up the cache
    runs-on: windows-latest
    steps:
      - &disable_autocrlf
        name: Disable autocrlf
        shell: pwsh
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - &checkout
        name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          show-progress: false

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        env:
          CACHE_NAME: cargo
        with:
          path: |
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-${{ runner.arch }}-build-${{ env.CACHE_NAME }}-${{ hashFiles('Cargo.lock') }}-${{ github.workflow }}-warm-up-cache
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-build-${{ env.CACHE_NAME }}-${{ hashFiles('Cargo.lock') }}-${{ github.workflow }}-
            ${{ runner.os }}-${{ runner.arch }}-build-${{ env.CACHE_NAME }}-${{ hashFiles('Cargo.lock') }}-
            ${{ runner.os }}-${{ runner.arch }}-build-${{ env.CACHE_NAME }}-

      - &set_up_mold
        name: Set up mold
        uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1

      - &set_up_toolchain_windows
        name: Set up toolchain
        shell: pwsh
        run: |
          Remove-Item -ErrorAction SilentlyContinue ${HOME}/.cargo/bin/cargo-fmt.exe
          Remove-Item -ErrorAction SilentlyContinue ${HOME}/.cargo/bin/rust-analyzer.exe
          Remove-Item -ErrorAction SilentlyContinue ${HOME}/.cargo/bin/rustfmt.exe

          rustup self update
          rustup update
          rustup show active-toolchain || rustup toolchain install
          rustup show

          cargo --version

      - name: Fetch
        shell: pwsh
        run: |
          cargo fetch --locked

  changes:
    name: Detect changes
    runs-on: ubuntu-slim
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - *checkout

      - name: Check if we actually made changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: .github/file-filters.yml

  cargo-build-windows:
    name: Cargo build Windows
    runs-on: windows-latest
    needs:
      - warm-up-cache
    steps:
      - *disable_autocrlf

      - *checkout

      - &cache_cargo_windows
        name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        env:
          CACHE_NAME: cargo
        with:
          path: |
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-${{ runner.arch }}-build-${{ env.CACHE_NAME }}-${{ hashFiles('Cargo.lock') }}-${{ github.workflow }}-warm-up-cache
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-build-${{ env.CACHE_NAME }}-${{ hashFiles('Cargo.lock') }}-${{ github.workflow }}-

      - *set_up_mold

      - *set_up_toolchain_windows

      - name: Build
        shell: pwsh
        run: |
          cargo build --all-features --all-targets --locked --workspace --verbose

  cargo-fmt-windows:
    name: Cargo fmt
    runs-on: ubuntu-latest
    needs:
      - changes
      - warm-up-cache
    if: |
      github.event_name == 'pull_request' &&
      fromJSON(needs.changes.outputs.rust) == true
    steps:
      - *disable_autocrlf

      - *checkout

      - *cache_cargo_windows

      - *set_up_toolchain_windows

      - name: Install rustfmt
        shell: pwsh
        run: |
          rustup component add rustfmt

          # restore symlinks
          rustup update

      - name: Check formatting
        shell: pwsh
        run: |
          cargo fmt --all -- --check

  cargo-test-and-report-windows:
    name: Cargo test (and report) Windows
    runs-on: windows-latest
    needs:
      - warm-up-cache
    permissions:
      checks: write
      id-token: write
      pull-requests: write
    steps:
      - *disable_autocrlf

      - *checkout

      - *cache_cargo_windows

      - *set_up_mold

      - *set_up_toolchain_windows

      - name: Install llvm-tools
        shell: pwsh
        run: |
          rustup component add llvm-tools

          # restore symlinks
          rustup update

      - name: Install nextest, custom test runner, with native support for junit and grcov
        uses: taiki-e/install-action@4bc351f7f2614e48088386e2a0ad917ca3a7e4ba # v2.81.5
        with:
          tool: cargo-nextest, grcov

      - name: Build with instrumentation support
        shell: pwsh
        env:
          RUSTFLAGS: "${{ env.RUSTFLAGS }} --allow=warnings -Cinstrument-coverage"
          # build-* ones are not parsed by grcov
          LLVM_PROFILE_FILE: "profiling/build-%p-%m.profraw"
        run: |
          cargo build --all-features --all-targets --locked --workspace --verbose

      - name: Run nextest
        shell: pwsh
        id: tests
        env:
          RUSTFLAGS: "${{ env.RUSTFLAGS }} --allow=warnings -Cinstrument-coverage"
          LLVM_PROFILE_FILE: "profiling/profile-%p-%m.profraw"
        run: |
          cargo nextest run --profile ci --no-fail-fast --all-targets --all-features --workspace
        continue-on-error: true

      - name: Upload test results
        uses: EnricoMi/publish-unit-test-result-action/windows@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        with:
          check_name: Test results Windows
          github_token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            reports/results.xml

      - name: Run grcov
        shell: pwsh
        run: |
          grcov $(Get-ChildItem -Recurse -Filter 'profile-*.profraw' -Path . | ForEach-Object { $_.FullName }) `
            --binary-path ./target/debug/ `
            --branch `
            --excl-br-line '^\s*((debug_)?assert(_eq|_ne)?!)' `
            --excl-br-start 'mod tests \{' `
            --excl-line '(#\[derive\()|(^\s*.await[;,]?$)' `
            --excl-start 'mod tests \{' `
            --ignore-not-existing `
            --keep-only 'crates/**' `
            --llvm `
            --output-path ./reports/ `
            --output-type lcov `
            --source-dir .

      - name: Record Rust version
        shell: pwsh
        run: |
          $version=(rustc --version)

          Add-Content -Path "$env:GITHUB_ENV" -Value "RUST=$version"

      - name: Upload coverage results (to Codecov.io)
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          disable_search: true
          disable_telem: true
          env_vars: OS,RUST
          fail_ci_if_error: true
          flags: windows
          files: reports/lcov
          name: code-coverage
          plugins: ""
          report_type: "coverage"
          use_oidc: true

      - name: Upload test results (to Codecov.io)
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          disable_search: true
          disable_telem: true
          env_vars: OS,RUST
          fail_ci_if_error: true
          flags: windows
          files: reports/results.xml
          name: test-results
          plugins: ""
          report_type: "test_results"
          use_oidc: true

      - name: Fail if tests failed
        shell: pwsh
        if: |
          steps.tests.outcome != 'success'
        run: |
          # the test reporter we use (or any for that matter)
          # all show a report. But we cannot depend on that report because
          # we don't know which subsection it belongs in GitHub
          # so we explicitly fail this one
          # which will fail All Done
          exit 1

  cargo-clippy-and-report-windows:
    name: Cargo clippy (and report) Windows
    runs-on: windows-latest
    needs:
      - changes
      - warm-up-cache
    if: |
      github.event_name == 'pull_request' &&
      fromJSON(needs.changes.outputs.rust) == true
    steps:
      - *disable_autocrlf

      - *checkout

      - *cache_cargo_windows

      - *set_up_mold

      - *set_up_toolchain_windows

      - name: Run Clippy for GitHub Actions report
        uses: actions-rs-plus/clippy-check@23b52efac3da0e2b197a9ad2e7be0f515502aaaf # v2.5.0
        with:
          args: ${{ env.CARGO_FEATURES }} --all-targets --locked --workspace

  all-done:
    name: Rust All done
    # this is the job that should be marked as required on GitHub. It's the only one that'll reliably trigger
    # when any upstream fails: success
    # when all upstream skips: pass
    # when all upstream success: success
    # combination of upstream skip and success: success
    runs-on: ubuntu-slim
    needs:
      - changes
      - cargo-build-windows
      - cargo-clippy-and-report-windows
      - cargo-fmt-windows
      - cargo-test-and-report-windows
    if: |
      !cancelled()
    steps:
      - name: Fail!
        shell: bash
        if: |
          contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'cancelled')
        run: |
          echo "One / more upstream failed or was cancelled. Failing job..."

          exit 1

      - name: Success!
        shell: bash
        run: |
          echo "Great success!"
