[package]
name = "hw-monitor-alignment"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
description.workspace = true
license.workspace = true
categories.workspace = true
keywords.workspace = true
repository.workspace = true
include.workspace = true
build = "src/build.rs"

[features]
default = []

[dependencies]
hashbrown = "0.17.1"
windows = { git = "https://github.com/microsoft/windows-rs", features = [
    "Win32_System_WinRT",
    "Win32_UI_Shell",
] }
windows-core = { git = "https://github.com/microsoft/windows-rs" }
windows-link = { git = "https://github.com/microsoft/windows-rs" }
windows-reactor = { git = "https://github.com/microsoft/windows-rs" }
windows-sys = { git = "https://github.com/microsoft/windows-rs", features = [
    "Win32_Foundation",
    "Win32_Graphics_Gdi",
    "Win32_Graphics_GdiPlus",
    "Win32_Devices_Display",
    "Win32_UI_Controls",
    "Win32_UI_HiDpi",
    "Win32_UI_WindowsAndMessaging",
    "Win32_UI_Input_KeyboardAndMouse",
    "Win32_System_LibraryLoader",
] }

[build-dependencies]
windows-bindgen = { git = "https://github.com/microsoft/windows-rs" }
windows-rdl = { git = "https://github.com/microsoft/windows-rs" }
windows-reactor-setup = { git = "https://github.com/microsoft/windows-rs" }

[dev-dependencies]
pretty_assertions = "=1.4.1"

[lints]
workspace = true
